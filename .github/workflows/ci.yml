name: CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
# • Every push on every branch  → run lint + build (fast feedback for all devs)
# • Every PR targeting main      → run full suite including tests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Type-check ─────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        # The project's lint script includes --fix; in CI we still want a
        # non-zero exit code when un-fixable issues exist, so this is correct.
        run: bun run lint

      - name: TypeScript type-check
        run: bunx tsc --noEmit

  # ── Job 2: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build NestJS application
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # ── Job 3: Test ──────────────────────────────────────────────────────────────
  test:
    name: Test (unit + coverage)
    runs-on: ubuntu-latest
    needs: lint

    # Service containers — MongoDB for tests that hit the database
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Minimal env so Joi validation passes in test mode; all optional secrets
    # are intentionally left blank (unit tests use mocks)
    env:
      NODE_ENV: test
      PORT: 3001
      APP_URL: http://localhost:3001
      MONGODB_URI: mongodb://localhost:27017/edutech_test
      JWT_SECRET: ci-jwt-secret-for-testing-only
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-for-testing-only
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN_DAYS: 1
      # Optional vars — empty is fine in test mode (Joi schema allows it)
      CLOUDINARY_CLOUD_NAME: ''
      CLOUDINARY_API_KEY: ''
      CLOUDINARY_API_SECRET: ''
      SMTP_HOST: ''
      SMTP_USER: ''
      SMTP_PASS: ''
      GEMINI_API_KEY: ''
      OPENAI_API_KEY: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:cov
        # --passWithNoTests is embedded in the test:cov script so Jest exits 0
        # when no .spec.ts files exist yet. Remove the flag once tests are added.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7
