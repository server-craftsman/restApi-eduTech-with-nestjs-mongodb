name: CD

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Run after CI workflow passes on main branch.
# Ensures code is never deployed to production if tests fail.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

# Prevent two deployments from running in parallel
concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  # ── Guard: skip if CI failed ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # Only run when CI succeeds
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render Deploy Hook
        # Render will pull the latest code from GitHub and automatically build + restart.
        # RENDER_DEPLOY_HOOK_URL is obtained from:
        #   Render Dashboard → Service → Settings → Deploy Hook → Copy URL
        # Then add it to GitHub:
        #   Settings → Secrets and variables → Actions → New repository secret
        #   Name: RENDER_DEPLOY_HOOK_URL
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "❌ Deploy hook failed with status $HTTP_CODE"
              exit 1
          fi
          echo "✅ Deploy triggered successfully"
